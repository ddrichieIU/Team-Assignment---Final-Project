<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Vault | Details</title>
    <link rel="stylesheet" href="CSS/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a href="index.html" class="logo">Movie Vault</a>
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="search.html">Search</a>
          <a href="watchlist.html">Watchlist</a>
          <a href="about.html">About</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <section id="detailsHero" class="details-hero">
        <div class="details-backdrop"></div>
        <div class="details-backdrop-overlay"></div>
        <div class="container details-layout">
          <div id="detailsPoster" class="details-poster-wrap"></div>
          <div class="details-info">
            <p id="detailsTagline" class="eyebrow"></p>
            <h1 id="detailsTitle">Loading...</h1>
            <div id="detailsMeta" class="details-meta"></div>
            <p id="detailsOverview" class="details-overview"></p>
            <div class="details-actions">
              <button id="saveMovieBtn" class="btn btn-primary" type="button">
                Save to Watchlist
              </button>
              <a href="search.html" class="btn btn-outline">Back to Search</a>
            </div>
          </div>
        </div>
      </section>

      <section class="container section">
        <div class="details-panels">
          <div class="details-panel">
            <h3>Genres</h3>
            <div id="detailsGenres" class="tag-list"></div>
          </div>
          <div class="details-panel">
            <h3>Additional Info</h3>
            <ul id="detailsFacts" class="facts-list"></ul>
          </div>
        </div>

        <div id="detailsError" class="state-message error hidden">
          Movie details could not be loaded.
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Movie Vault</p>
      </div>
    </footer>

    <script src="JS/config.example.js"></script>
    <script src="JS/api.js"></script>
    <script src="JS/firebase.js"></script>
    <script src="JS/ui.js"></script>
    <script src="JS/details.js"></script>
  </body>
</html>
